name: Notify Wiki Count by Namespace

on:
  schedule:
    # 09:00 JST every Monday
    # ⚠️ The timing is somehow not accurate at all
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      language:
        description: Specify the language used for the wiki pages
        required: true
        default: English
        type: choice
        options:
          - English
          - Japanese

permissions:
  contents: read

jobs:
  count-uncategorised:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      uncategorised_wiki_count: ${{ steps.format.outputs.uncategorised_wiki_count }}
    steps:
      # The main repository must live at the workspace root so that the local
      # .github/actions/* resolve and ruby/setup-ruby finds .ruby-version.
      - name: Checkout the Main Repository
        uses: actions/checkout@v7
      - name: Checkout the Wiki Repository
        uses: actions/checkout@v7
        with:
          repository: "${{ github.repository }}.wiki"
          ref: master
          path: .wiki
      # The Ruby entry points resolve the wiki as base_path '../..', i.e. they
      # expect to run from <wiki>/spreen-wiki/RubyGem (the wiki tracks
      # the main repository as a submodule there). The submodule's SSH URL
      # cannot be cloned with GITHUB_TOKEN, so copy the checkout into that path.
      - name: Nest the Main Repository in the Wiki
        run: rsync -a --exclude .git --exclude /.wiki ./ .wiki/spreen-wiki/
      - uses: ./.github/actions/setup-ruby
        with:
          job-name: count_uncategorised
      - name: Format Uncategorised Wiki Count by Namespace
        id: format
        working-directory: .wiki
        env:
          # The library no longer hardcodes the organisation; the Rake tasks
          # read it from this variable.
          ORGANISATION_NAME: ${{ github.repository_owner }}
        run: |
          set -xe
          git pull origin master
          (cd spreen-wiki/RubyGem && printf 'Category\n%s\n' "${{ github.event.inputs.language || 'English' }}" | rake export_unknown_wiki_count_list_by_namespace)
          uncategorised_wiki_count=$(ruby -e "puts File.readlines('unknown_wiki_count_list_by_namespace.txt')[0]")
          echo "uncategorised_wiki_count=$uncategorised_wiki_count" >> $GITHUB_OUTPUT
          rm unknown_wiki_count_list_by_namespace.txt

  notify-uncategorised:
    needs: count-uncategorised
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Main Repository
        uses: actions/checkout@v7
      - name: Slack Notification
        uses: ./.github/actions/slack-notify
        with:
          slack-token: ${{ secrets.SLACK_APP_TOKEN }}
          slack-channel: ${{ secrets.SLACK_CHANNEL_ID }}
          header: "【spreen-wiki Weekly Uncategorised Wiki Count by Namespace Report】"
          mrkdwn-sections: |
            <https://github.com/${{ github.repository }}/wiki#uncategorised|${{ needs.count-uncategorised.outputs.uncategorised_wiki_count }}>

  count-unowned:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      unknown_but_necessary: ${{ steps.format.outputs.unknown_but_necessary }}
      unknown_owner_nor_necessity: ${{ steps.format.outputs.unknown_owner_nor_necessity }}
      unowned: ${{ steps.format.outputs.unowned }}
    steps:
      # See count-uncategorised for why the main repository is checked out at
      # the workspace root and copied into the wiki's submodule path.
      - name: Checkout the Main Repository
        uses: actions/checkout@v7
      - name: Checkout the Wiki Repository
        uses: actions/checkout@v7
        with:
          repository: "${{ github.repository }}.wiki"
          ref: master
          path: .wiki
      - name: Nest the Main Repository in the Wiki
        run: rsync -a --exclude .git --exclude /.wiki ./ .wiki/spreen-wiki/
      - uses: ./.github/actions/setup-ruby
        with:
          job-name: count_unowned
      - name: Format Unknown Wiki Count by Namespace
        id: format
        working-directory: .wiki
        env:
          # The library no longer hardcodes the organisation; the Rake tasks
          # read it from this variable.
          ORGANISATION_NAME: ${{ github.repository_owner }}
        run: |
          set -xe
          git pull origin master
          (cd spreen-wiki/RubyGem && printf 'Owner\n%s\n' "${{ github.event.inputs.language || 'English' }}" | rake export_unknown_wiki_count_list_by_namespace)
          unknown_but_necessary=$(ruby -e "puts File.readlines('unknown_wiki_count_list_by_namespace.txt')[0]")
          unknown_owner_nor_necessity=$(ruby -e "puts File.readlines('unknown_wiki_count_list_by_namespace.txt')[1]")
          unowned=$(ruby -e "puts File.readlines('unknown_wiki_count_list_by_namespace.txt')[2]")
          echo "unknown_but_necessary=$unknown_but_necessary" >> $GITHUB_OUTPUT
          echo "unknown_owner_nor_necessity=$unknown_owner_nor_necessity" >> $GITHUB_OUTPUT
          echo "unowned=$unowned" >> $GITHUB_OUTPUT
          rm unknown_wiki_count_list_by_namespace.txt

  notify-unowned:
    needs: count-unowned
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Main Repository
        uses: actions/checkout@v7
      - name: Slack Notification
        uses: ./.github/actions/slack-notify
        with:
          slack-token: ${{ secrets.SLACK_APP_TOKEN }}
          slack-channel: ${{ secrets.SLACK_CHANNEL_ID }}
          header: "【spreen-wiki Weekly Unowned Wiki Count Report】"
          mrkdwn-sections: |
            <https://github.com/${{ github.repository }}/wiki#unowned-but-necessary-wiki|${{ needs.count-unowned.outputs.unknown_but_necessary }}>
            <https://github.com/${{ github.repository }}/wiki#unknown-owner-nor-necessity-wiki|${{ needs.count-unowned.outputs.unknown_owner_nor_necessity }}>
            <https://github.com/${{ github.repository }}/wiki#unowned|${{ needs.count-unowned.outputs.unowned }}>
