name: Update Wiki List on Home and Sidebar

on:
  schedule:
    # 12:00 and 22:00 JST every weekday
    # ⚠️ The timing is somehow not accurate at all
    - cron: "0 3 * * 1-5"
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      group_by:
        description: Specify the grouping criteria for the wiki pages
        required: true
        default: Owner
        type: choice
        options:
          - Owner
          - Category
      language:
        description: Specify the language used for the wiki pages
        required: true
        default: English
        type: choice
        options:
          - English
          - Japanese
      home_overflow:
        description: Check if Home page took too long to render.
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  update_wiki_list_on_home_and_sidebar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      commit_message: ${{ steps.commit.outputs.commit_message }}
      jst_current_datetime: ${{ steps.commit.outputs.jst_current_datetime }}
    steps:
      # The main repository must live at the workspace root so that the local
      # .github/actions/* resolve and ruby/setup-ruby finds .ruby-version.
      - name: Checkout the Main Repository
        uses: actions/checkout@v7
        with:
          repository: "${{ github.repository }}"
          ref: master
      - name: Checkout the Wiki Repository
        uses: actions/checkout@v7
        with:
          repository: "${{ github.repository }}.wiki"
          ref: master
          path: ./wiki
      # The Ruby entry points resolve the wiki as base_path '../..', i.e. they
      # expect to run from <wiki>/spreen-wiki/RubyGem (the wiki tracks
      # the main repository as a submodule there). The submodule's SSH URL
      # cannot be cloned with GITHUB_TOKEN, so copy the checkout into that path
      # instead; git ignores the contents of an uninitialised submodule path,
      # so commit-and-push will not pick the copy up.
      - name: Nest the Main Repository in the Wiki
        run: rsync -a --exclude .git --exclude wiki ./ wiki/spreen-wiki/
      - name: Configure Git Identity
        uses: ./.github/actions/configure-git-identity
      - uses: ./.github/actions/setup-ruby
        with:
          job-name: update_wiki_list_on_home_and_sidebar
      - name: Update spreen-wiki Wiki
        working-directory: ./wiki
        env:
          # The library no longer hardcodes the organisation; the Rake tasks
          # read it from this variable.
          ORGANISATION_NAME: ${{ github.repository_owner }}
        run: |
          set -xe
          git pull origin master
          cd spreen-wiki/RubyGem
          printf '%s\n%s\n%s\n' "${{ github.event.inputs.group_by || 'Owner' }}" "${{ github.event.inputs.language || 'English' }}" "${{ github.event.inputs.home_overflow || false }}" | rake update_wiki_list_on_home_and_sidebar
      - name: Commit and Push
        id: commit
        uses: ./.github/actions/commit-and-push
        with:
          working-directory: ./wiki
          commit-message-prefix: "Update Wiki list on Home and Sidebar by GitHub Actions[bot]"

  notify:
    needs: update_wiki_list_on_home_and_sidebar
    if: contains(needs.update_wiki_list_on_home_and_sidebar.outputs.commit_message, needs.update_wiki_list_on_home_and_sidebar.outputs.jst_current_datetime)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Main Repository
        uses: actions/checkout@v7
      - name: Slack Notification
        uses: ./.github/actions/slack-notify
        with:
          slack-token: ${{ secrets.SLACK_APP_TOKEN }}
          slack-channel: ${{ secrets.SLACK_CHANNEL_ID }}
          header: "【spreen-wiki Daily Wiki List on Home and Sidebar Update Report】"
          mrkdwn-sections: |
            Workflows: <https://github.com/${{ github.repository }}/blob/master/.github/workflows/update-wiki-list-on-home-and-sidebar.yml|Update Wiki List on Home and Sidebar>
            Commit: ${{ needs.update_wiki_list_on_home_and_sidebar.outputs.commit_message }}
            Source: <https://github.com/${{ github.repository }}/wiki|spreen-wiki Wiki>
