# Reference: https://github.com/rubocop/ruby-style-guide

plugins:
  - rubocop-minitest
  - rubocop-performance

AllCops:
  # Matches the gemspec's required_ruby_version; the gem supports Ruby 3.4+.
  TargetRubyVersion: 3.4
  NewCops: enable

Layout/LeadingCommentSpace:
  # `#: Type` trailing comments are rbs-inline annotations, not prose.
  AllowRBSInlineAnnotation: true

Metrics/ClassLength:
  # Data literals such as Configuration::DEFAULT_LABELS count as one line.
  CountAsOne:
    - array
    - hash
    - heredoc

Metrics/ParameterLists:
  # The public entry points take their configuration as keyword arguments.
  CountKeywordArgs: false
